name: econome
description: "Économe par Paul Carouge — Application de finances personnelles. Suivi des dépenses, budget mensuel, épargne, anti-achat impulsif. 100% locale, gratuite, open source."
publish_to: 'none'
version: 1.2.2+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Local database
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # Navigation
  go_router: ^17.3.0

  # Charts
  fl_chart: ^1.2.0

  # Formatting & locale
  intl: ^0.20.2
  shared_preferences: ^2.5.3

  # Animations
  flutter_animate: ^4.5.2

  # UI helpers
  google_fonts: ^8.1.0

  # URL launching
  url_launcher: ^6.3.1

  # Sharing
  share_plus: ^10.1.4

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  material_color_utilities: ^0.13.0
  flutter_confetti: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  drift_dev: ^2.25.2
  riverpod_generator: ^4.0.4-dev.1
  riverpod_lint: ^3.1.4-dev.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/illustrations/
